services:
  caddy:
    container_name: caddy
    image: docker.io/library/caddy:2-alpine
    networks:
      - ollama-net
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:rw,Z
      - caddy-data:/data:rw,Z
      - caddy-config:/config:rw,Z
    environment:
      - SEARXNG_HOSTNAME=${SEARXNG_HOSTNAME:-localhost}
      - SEARXNG_EMAIL=${SEARXNG_EMAIL:-admin@example.com}
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  redis:
    container_name: redis
    image: docker.io/valkey/valkey:8-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    networks:
      - ollama-net
    volumes:
      - valkey-data2:/data
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE  # 关键：允许忽略文件权限检查
    networks:
      - ollama-net
    ports:
      - "0.0.0.0:8081:8080"
    volumes:
      - ./searxng:/etc/searxng:rw,Z
      - searxng-data:/var/cache/searxng:rw,Z
    environment:
      - SEARXNG_BASE_URL=https://${SEARXNG_HOSTNAME:-localhost}/
      - SEARXNG_REDIS_URL=redis://redis:6379/0
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

networks:
  ollama-net:
    external: true

volumes:
  caddy-data:
  caddy-config:
  valkey-data2:
  searxng-data:
